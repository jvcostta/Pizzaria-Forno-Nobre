<div class="login-page">
  <section class="login-image-panel" aria-hidden="true"></section>

  <section class="login-form-panel">
    <div class="login-form-card">
      <header class="login-header">
        <h1>Bem-vindo de volta!</h1>
        <p>Entre com suas credenciais para continuar.</p>
      </header>

      @if (errorMessage()) {
        <div class="form-error" role="alert">
          <span class="material-symbols-outlined" aria-hidden="true">error</span>
          <p>{{ errorMessage() }}</p>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <div class="field-group">
          <label for="username">Usuário</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon" aria-hidden="true">person</span>
            <input
              id="username"
              type="text"
              formControlName="username"
              placeholder="Digite seu usuário"
              [class.input-invalid]="form.get('username')?.invalid && form.get('username')?.touched"
            />
          </div>
        </div>

        <div class="field-group">
          <label for="password">Senha</label>
          <div class="input-wrap">
            <span class="material-symbols-outlined input-icon" aria-hidden="true">lock</span>
            <input
              id="password"
              [type]="showPassword() ? 'text' : 'password'"
              formControlName="password"
              placeholder="Digite sua senha"
              [class.input-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            />
            <button
              type="button"
              class="toggle-password"
              (click)="showPassword.set(!showPassword())"
              [attr.aria-label]="showPassword() ? 'Ocultar senha' : 'Mostrar senha'"
            >
              <span class="material-symbols-outlined" aria-hidden="true">
                {{ showPassword() ? 'visibility_off' : 'visibility' }}
              </span>
            </button>
          </div>
        </div>

        <button type="submit" [disabled]="form.invalid || isLoading()" class="submit-button">
          @if (isLoading()) {
            <span class="button-spinner" aria-hidden="true"></span>
            Entrando...
          } @else {
            Entrar
          }
        </button>
      </form>

      <footer class="login-footer">
        Credenciais padrão: <strong>admin</strong> / <strong>admin123</strong>
      </footer>
    </div>
  </section>
</div>
