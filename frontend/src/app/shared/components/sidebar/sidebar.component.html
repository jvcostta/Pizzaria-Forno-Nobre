<aside class="flex flex-col h-full bg-white border-r border-gray-200 w-64 flex-shrink-0">
  <!-- Logo -->
  <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-100">
    <div class="w-9 h-9 bg-primary-600 rounded-xl flex items-center justify-center flex-shrink-0">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z" fill="white" opacity="0.3"/>
        <path d="M12 4C7.58 4 4 7.58 4 12s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 2c1.1 0 2 .9 2 2s-.9 2-2 2-2-.9-2-2 .9-2 2-2zm0 12c-2.7 0-5.09-1.43-6.44-3.57.03-2.12 4.29-3.29 6.44-3.29s6.41 1.17 6.44 3.29C17.09 16.57 14.7 18 12 18z" fill="white"/>
      </svg>
    </div>
    <div>
      <h1 class="text-base font-bold text-gray-900 leading-tight">PizzaManager</h1>
      <p class="text-xs text-gray-400">Forno Nobre</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-primary-50 text-primary-700 font-semibold"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-all duration-150 group"
        (click)="closeSidebar.emit()"
      >
        <span class="material-symbols-outlined text-xl leading-none group-[.bg-primary-50]:text-primary-600">
          {{ item.icon }}
        </span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Logout -->
  <div class="px-3 pb-4 border-t border-gray-100 pt-3">
    <button
      (click)="logout()"
      class="flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm text-gray-500 hover:bg-red-50 hover:text-red-600 transition-all duration-150"
    >
      <span class="material-symbols-outlined text-xl leading-none">logout</span>
      Sair
    </button>
  </div>
</aside>
