<aside class="artisan-sidebar flex flex-col h-full w-64 shrink-0">
  <!-- Logo -->
  <div class="artisan-sidebar-logo flex items-center gap-3 px-6 py-5">
    <div class="artisan-logo-mark w-9 h-9 rounded-xl flex items-center justify-center shrink-0">
      <!-- Pizza icon (white version for colored bg) -->
      <svg width="22" height="22" viewBox="0 0 36 36" xmlns="http://www.w3.org/2000/svg">
        <circle cx="18" cy="18" r="16" fill="white" opacity="0.25"/>
        <circle cx="18" cy="18" r="13" fill="white" opacity="0.5"/>
        <line x1="18" y1="5" x2="18" y2="31" stroke="white" stroke-width="0.9" opacity="0.7"/>
        <line x1="5" y1="18" x2="31" y2="18" stroke="white" stroke-width="0.9" opacity="0.7"/>
        <line x1="8.96" y1="8.96" x2="27.04" y2="27.04" stroke="white" stroke-width="0.9" opacity="0.7"/>
        <line x1="27.04" y1="8.96" x2="8.96" y2="27.04" stroke="white" stroke-width="0.9" opacity="0.7"/>
        <circle cx="18" cy="12" r="2" fill="white"/>
        <circle cx="12.5" cy="20.5" r="2" fill="white"/>
        <circle cx="23.5" cy="20.5" r="2" fill="white"/>
        <circle cx="14" cy="14" r="1.3" fill="white" opacity="0.75"/>
        <circle cx="22" cy="13.5" r="1.3" fill="white" opacity="0.75"/>
      </svg>
    </div>
    <div>
      <h1 class="text-base font-bold leading-tight">Forno Nobre</h1>
      <p class="text-xs">Gestão de Pizzaria</p>
    </div>
  </div>

  <!-- Navigation -->
  <nav class="artisan-sidebar-nav flex-1 px-3 py-4 space-y-1 overflow-y-auto">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: item.route === '/dashboard' }"
        class="artisan-nav-link flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-all duration-150"
        (click)="closeSidebar.emit()"
      >
        <span class="material-symbols-outlined text-xl leading-none">
          {{ item.icon }}
        </span>
        {{ item.label }}
      </a>
    }
  </nav>

  <!-- Logout -->
  <div class="artisan-sidebar-footer px-3 pb-4 pt-3">
    <button
      (click)="logout()"
      class="artisan-logout-link flex items-center gap-3 w-full px-3 py-2.5 rounded-lg text-sm transition-all duration-150"
    >
      <span class="material-symbols-outlined text-xl leading-none">logout</span>
      Sair
    </button>
  </div>
</aside>
